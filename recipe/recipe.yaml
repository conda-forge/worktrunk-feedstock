context:
  version: "0.34.1"

package:
  name: worktrunk
  version: ${{ version }}

source:
  url: https://github.com/max-sixty/worktrunk/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1f173b8ab34c08d7fa1b1c5cfdad3dc68c6325464e8e6734066b47f490d5a0fe

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - wt --help
  - package_contents:
      bin:
        - wt

about:
  homepage: https://worktrunk.dev
  summary: A CLI for Git worktree management, designed for parallel AI agent workflows
  description: |
    Worktrunk is a CLI for Git worktree management, designed for parallel AI
    agent workflows. It provides commands for creating, managing, and navigating
    Git worktrees with features like fuzzy finding, shell integration, and
    template support.
  license: MIT OR Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://docs.rs/worktrunk
  repository: https://github.com/max-sixty/worktrunk

extra:
  recipe-maintainers:
    - pavelzw
